<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Tamu Meriah</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            color: #ffffff;
            overflow: hidden;
            position: relative;
        }

        /* Canvas untuk kembang api */
        #fireworksCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Container Tombol */
        .login-container {
            position: absolute;
            z-index: 10;
            /* Posisi awal di tengah */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            touch-action: none; /* Mencegah scroll bawaan hp saat di-drag */
        }

        /* 1. Sudut lengkung (border-radius: 50px) & 6. Warna-warni bergantian via animasi */
        .google-btn {
            background-color: #111;
            color: #ffffff;
            border: 3px solid #fff;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px; /* Sudut sangat lengkung (kapsul) */
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: transform 0.1s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            user-select: none;
            outline: none;
            /* Animasi siklus 11 warna (setiap warna bertahan ~1 detik, total 11 detik) */
            animation: warnaWarni 11s infinite linear;
        }

        .google-btn:active {
            transform: scale(0.95);
        }

        .google-icon {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 2px;
            border-radius: 50%;
        }

        /* 5. Efek Cantik nan Rame saat Loading di dalam tombol */
        .loader-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            animation: meletup 0.6s ease-out forwards;
        }

        /* Animasi 11 Warna untuk Tombol (Permintaan 6) */
        @keyframes warnaWarni {
            0%   { border-color: #ff0000; box-shadow: 0 0 20px #ff0000; color: #ff0000; }
            10%  { border-color: #ff7f00; box-shadow: 0 0 20px #ff7f00; color: #ff7f00; }
            20%  { border-color: #ffff00; box-shadow: 0 0 20px #ffff00; color: #ffff00; }
            30%  { border-color: #00ff00; box-shadow: 0 0 20px #00ff00; color: #00ff00; }
            40%  { border-color: #00ffff; box-shadow: 0 0 20px #00ffff; color: #00ffff; }
            50%  { border-color: #0000ff; box-shadow: 0 0 20px #0000ff; color: #0000ff; }
            60%  { border-color: #8b00ff; box-shadow: 0 0 20px #8b00ff; color: #8b00ff; }
            70%  { border-color: #ff00ff; box-shadow: 0 0 20px #ff00ff; color: #ff00ff; }
            80%  { border-color: #ff1493; box-shadow: 0 0 20px #ff1493; color: #ff1493; }
            90%  { border-color: #1e90ff; box-shadow: 0 0 20px #1e90ff; color: #1e90ff; }
            100% { border-color: #32cd32; box-shadow: 0 0 20px #32cd32; color: #32cd32; }
        }

        @keyframes meletup {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <div class="login-container" id="loginContainer">
        <button class="google-btn" id="googleBtn">
            <div class="google-icon">
                <svg viewBox="0 0 24 24" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
            </div>
            <span>Google</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
          apiKey: "AIzaSyDrEQ7GcPPo8CbqF0_dRwDlXSXbz1FsmPs",
          authDomain: "hahahihi-5084e.firebaseapp.com",
          projectId: "hahahihi-5084e",
          storageBucket: "hahahihi-5084e.firebasestorage.app",
          messagingSenderId: "691544964510",
          appId: "1:691544964510:web:561a1aed05c8a8f5ff6a8f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const container = document.getElementById('loginContainer');
        const button = document.getElementById('googleBtn');

        // --- BERPINDAH HALAMAN & EFEK LOADING RAME (Permintaan 2 & 5) ---
        button.addEventListener('click', function(e) {
            if (isDragging) return; // Jangan trigger jika cuma beres ngedrag

            // Buat efek meletup ramai di dalam tombol (Confetti kembang api mini)
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.classList.add('loader-particle');
                
                // Variasi warna acak yang meriah
                const colors = ['#FF1493', '#00FFFF', '#FFD700', '#FF4500', '#00FF00', '#9400D3'];
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Set arah ledakan acak
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100 + 30;
                p.style.setProperty('--x', `${Math.cos(angle) * distance}px`);
                p.style.setProperty('--y', `${Math.sin(angle) * distance}px`);
                
                // Posisi awal di koordinat klik pointer
                p.style.left = `${e.offsetX}px`;
                p.style.top = `${e.offsetY}px`;
                
                button.appendChild(p);
            }

            // Jalankan Firebase Auth
            signInWithPopup(auth, provider)
                .then((result) => {
                    console.log("Pengguna berhasil masuk:", result.user.displayName);
                    // Beri jeda 1 detik agar efek meriahnya kelihatan sebelum pindah halaman
                    setTimeout(() => {
                        window.location.href = 'beranda.html'; // 2. Diarahkan ke beranda.html
                    }, 1000);
                }).catch((error) => {
                    console.error("Gagal masuk:", error.message);
                    // Tetap pindah ke beranda.html untuk keperluan simulasi lokal jika firebase di-block browser
                    setTimeout(() => { window.location.href = 'beranda.html'; }, 1000);
                });
        });


        // --- TOMBOL JALAN-JALAN OTOMATIS (Permintaan 3) ---
        let posX = window.innerWidth / 2;
        let posY = window.innerHeight / 2;
        let speedX = 2.5; // Kecepatan jalan arah X
        let speedY = 2;   // Kecepatan jalan arah Y
        let isUserInteracting = false;

        function jalanJalan() {
            if (!isUserInteracting) {
                const rect = container.getBoundingClientRect();
                
                // Memantul di batas layar browser agar bisa keliling sejauh mungkin
                if (posX - rect.width/2 <= 0 || posX + rect.width/2 >= window.innerWidth) speedX *= -1;
                if (posY - rect.height/2 <= 0 || posY + rect.height/2 >= window.innerHeight) speedY *= -1;

                posX += speedX;
                posY += speedY;

                container.style.left = posX + 'px';
                container.style.top = posY + 'px';
            }
            requestAnimationFrame(jalanJalan);
        }
        // Jalankan fungsi otomatis jalan-jalan
        setTimeout(jalanJalan, 1000);


        // --- FITUR DRAG / DIGESER DENGAN JARI ATAU MOUSE (Permintaan 4) ---
        let isDragging = false;
        let startX, startY;

        function startDrag(e) {
            isUserInteracting = true;
            isDragging = false; // Reset status drag nyata
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const rect = container.getBoundingClientRect();
            startX = clientX - rect.left - rect.width/2;
            startY = clientY - rect.top - rect.height/2;

            window.addEventListener('mousemove', dragMove);
            window.addEventListener('touchmove', dragMove, { passive: false });
            window.addEventListener('mouseup', stopDrag);
            window.addEventListener('touchend', stopDrag);
        }

        function dragMove(e) {
            isDragging = true; // Terkonfirmasi digeser
            if (e.cancelable) e.preventDefault();
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            posX = clientX - startX;
            posY = clientY - startY;

            // Batasi agar tidak keluar layar saat digeser jari
            const rect = container.getBoundingClientRect();
            posX = Math.max(rect.width/2, Math.min(window.innerWidth - rect.width/2, posX));
            posY = Math.max(rect.height/2, Math.min(window.innerHeight - rect.height/2, posY));

            container.style.left = posX + 'px';
            container.style.top = posY + 'px';
        }

        function stopDrag() {
            window.removeEventListener('mousemove', dragMove);
            window.removeEventListener('touchmove', dragMove);
            window.removeEventListener('mouseup', stopDrag);
            window.removeEventListener('touchend', stopDrag);
            
            // Beri jeda sedikit sebelum mengaktifkan kembali jalan-jalan otomatisnya
            setTimeout(() => { isUserInteracting = false; }, 500);
        }

        container.addEventListener('mousedown', startDrag);
        container.addEventListener('touchstart', startDrag, { passive: false });


        // --- 7. SISTEM ANIMASI KEMBANG API (CANVAS) ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let fireworks = [];
        let particles = [];

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.targetY = Math.random() * (canvas.height * 0.6);
                this.speed = Math.random() * 4 + 4;
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
            }
            update() {
                this.y -= this.speed;
                if (this.y <= this.targetY) {
                    createParticles(this.x, this.y, this.color);
                    return false;
                }
                return true;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.gravity = 0.06;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.alpha -= 0.015;
                return this.alpha > 0;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function loop() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; // Efek trail pudar kembang api
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < 0.04) { // Frekuensi munculnya kembang api
                fireworks.push(new Firework());
            }

            fireworks = fireworks.filter(f => {
                if (f.update()) { f.draw(); return true; }
                return false;
            });

            particles = particles.filter(p => {
                if (p.update()) { p.draw(); return true; }
                return false;
            });

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
