<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buku Tamu Meriah</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background:#000;
    height:100vh;
    overflow:hidden;
    color:#fff;
    font-family: Arial, sans-serif;
}

#fireworksCanvas{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:1;
    pointer-events:none;
}

.login-container{
    position:absolute;
    z-index:10;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    touch-action:none;
}

.google-btn{
    padding:15px 30px;
    border-radius:50px;
    border:3px solid #fff;
    background:#111;
    color:#fff;
    font-weight:bold;
    font-size:18px;
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    animation: warna 11s linear infinite;
}

@keyframes warna{
0%{border-color:red; color:red;}
20%{border-color:yellow; color:yellow;}
40%{border-color:green; color:green;}
60%{border-color:cyan; color:cyan;}
80%{border-color:magenta; color:magenta;}
100%{border-color:lime; color:lime;}
}

.loader-particle{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    animation: meletup .6s forwards;
}

@keyframes meletup{
0%{transform:translate(0,0); opacity:1;}
100%{transform:translate(var(--x),var(--y)); opacity:0;}
}
</style>
</head>

<body>

<canvas id="fireworksCanvas"></canvas>

<div class="login-container" id="loginContainer">
    <button class="google-btn" id="googleBtn">
        🔵 Login Google
    </button>
</div>

<script type="module">
/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDrEQ7GcPPo8CbqF0_dRwDlXSXbz1FsmPs",
  authDomain: "hahahihi-5084e.firebaseapp.com",
  projectId: "hahahihi-5084e",
  storageBucket: "hahahihi-5084e.firebasestorage.app",
  messagingSenderId: "691544964510",
  appId: "1:691544964510:web:561a1aed05c8a8f5ff6a8f"
};

/* SAFE INIT */
let app, auth, provider;

try {
    app = initializeApp(firebaseConfig);
    auth = getAuth(app);
    provider = new GoogleAuthProvider();
    console.log("Firebase OK");
} catch (e) {
    console.log("Firebase ERROR:", e);
}

/* ================= UI ================= */
const container = document.getElementById("loginContainer");
const button = document.getElementById("googleBtn");

let isDragging = false;
let isUserInteracting = false;
let posX = window.innerWidth/2;
let posY = window.innerHeight/2;
let speedX = 2;
let speedY = 2;

/* ================= LOGIN ================= */
button.addEventListener("click", async (e)=>{

    if(isDragging) return;

    try{
        const result = await signInWithPopup(auth, provider);
        console.log("LOGIN OK:", result.user.displayName);

        setTimeout(()=>{
            window.location.href="beranda.html";
        },800);

    }catch(err){
        console.log("LOGIN ERROR:", err);

        // fallback biar tidak blank
        setTimeout(()=>{
            window.location.href="beranda.html";
        },1000);
    }

});

/* ================= DRAG ================= */
let startX, startY;

function startDrag(e){
    isUserInteracting = true;

    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;

    const rect = container.getBoundingClientRect();

    startX = x - rect.left - rect.width/2;
    startY = y - rect.top - rect.height/2;

    window.addEventListener("mousemove", dragMove);
    window.addEventListener("touchmove", dragMove,{passive:false});
    window.addEventListener("mouseup", stopDrag);
    window.addEventListener("touchend", stopDrag);
}

function dragMove(e){
    isDragging = true;

    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;

    posX = x - startX;
    posY = y - startY;

    container.style.left = posX+"px";
    container.style.top = posY+"px";
}

function stopDrag(){
    window.removeEventListener("mousemove", dragMove);
    window.removeEventListener("touchmove", dragMove);
    window.removeEventListener("mouseup", stopDrag);
    window.removeEventListener("touchend", stopDrag);

    setTimeout(()=>{ isUserInteracting=false; },300);
}

container.addEventListener("mousedown", startDrag);
container.addEventListener("touchstart", startDrag);

/* ================= AUTO MOVE ================= */
function jalan(){
    if(!isUserInteracting && !isDragging){
        posX += speedX;
        posY += speedY;

        if(posX < 0 || posX > window.innerWidth) speedX *= -1;
        if(posY < 0 || posY > window.innerHeight) speedY *= -1;

        container.style.left = posX+"px";
        container.style.top = posY+"px";
    }

    requestAnimationFrame(jalan);
}
jalan();

/* ================= ERROR GUARD ================= */
window.onerror = function(msg,src,line){
    console.log("JS ERROR:",msg,line);
};
</script>

</body>
</html>
