<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suara Besuki FM 102.5 - Cahaya Selatan Tulungagung</title>
    <meta name="description" content="Suara Besuki FM 102.5 Cahaya Selatan dari Tulungagung - Radio Dakwah & Informasi Besuki">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
    .glow-bg { position: fixed; top: 50%; left: 50%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, rgba(255,140,0,0.05) 40%, transparent 70%); transform: translate(-50%, -50%); pointer-events: none; animation: pulse 4s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); } 50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); } }
    .container { text-align: center; z-index: 10; padding: 20px; }
        h1 { font-size: 3.5rem; font-weight: 900; background: linear-gradient(45deg, #FFD700, #FFA500, #FFD700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(255, 215, 0, 0.5); margin-bottom: 5px; letter-spacing: 2px; }
    .freq { font-size: 2.5rem; font-weight: 700; color: #FFA500; margin-bottom: 15px; text-shadow: 0 0 20px rgba(255, 165, 0, 0.6); }
        h2 { font-size: 1.8rem; color: #FFA500; font-weight: 300; margin-bottom: 5px; letter-spacing: 4px; }
        h3 { font-size: 1.2rem; color: #888; font-weight: 400; margin-bottom: 40px; }
    .player-box { background: rgba(20, 20, 20, 0.8); border: 2px solid rgba(255, 215, 0, 0.3); border-radius: 20px; padding: 30px 40px; backdrop-filter: blur(10px); box-shadow: 0 0 40px rgba(255, 215, 0, 0.2); min-width: 350px; }
    .now-playing { font-size: 0.9rem; color: #FFA500; margin-bottom: 10px; min-height: 20px; word-break: break-all; }
    .listeners { font-size: 1.1rem; color: #0f0; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .listeners::before { content: '●'; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .header { position: fixed; top: 0; right: 0; padding: 20px; z-index: 100; }
    .profile-btn { background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.3); color: #FFD700; padding: 10px 20px; border-radius: 25px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.3s; }
    .profile-btn:hover { background: rgba(255, 215, 0, 0.2); box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
    .profile-btn img { width: 30px; height: 30px; border-radius: 50%; }
    .upload-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: linear-gradient(45deg, #FFD700, #FFA500); border: none; border-radius: 50%; font-size: 2rem; color: #000; cursor: pointer; box-shadow: 0 0 30px rgba(255, 215, 0, 0.6); transition: all 0.3s; z-index: 90; display: none; }
    .upload-btn:hover { transform: scale(1.1) rotate(90deg); box-shadow: 0 0 50px rgba(255, 215, 0, 0.8); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: #111; border: 2px solid rgba(255, 215, 0, 0.3); border-radius: 20px; padding: 40px; max-width: 500px; width: 90%; text-align: center; box-shadow: 0 0 60px rgba(255, 215, 0, 0.3); position: relative; }
    .modal-content h2 { color: #FFD700; margin-bottom: 20px; }
    .google-btn { background: #fff; color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 10px; margin: 20px auto; transition: all 0.3s; }
    .google-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
    .btn { background: linear-gradient(45deg, #FFD700, #FFA500); color: #000; border: none; padding: 12px 30px; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin: 10px; transition: all 0.3s; }
    .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { background: linear-gradient(45deg, #ff4444, #cc0000); color: #fff; }
        input[type="file"] { display: none; }
    .file-list { margin: 20px 0; text-align: left; max-height: 200px; overflow-y: auto; }
    .file-item { background: rgba(255, 215, 0, 0.1); padding: 10px; margin: 5px 0; border-radius: 5px; font-size: 0.9rem; }
    .close-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #FFD700; font-size: 2rem; cursor: pointer; }
        #audioPlayer { display: none; }
    .queue-info { color: #666; font-size: 0.85rem; margin-top: 15px; }
        @media (max-width: 600px) { h1 { font-size: 2.5rem; }.freq { font-size: 2rem; } h2 { font-size: 1.4rem; }.player-box { min-width: 300px; padding: 20px; } }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="header">
        <button class="profile-btn" id="profileBtn" style="display:none;">
            <img id="userAvatar" src="" alt="User">
            <span id="userName"></span>
        </button>
    </div>
    <div class="container">
        <h1>SUARA BESUKI FM</h1>
        <div class="freq">102.5</div>
        <h2>CAHAYA SELATAN</h2>
        <h3>TULUNGAGUNG</h3>
        <div class="player-box">
            <div class="now-playing" id="nowPlaying">Menunggu siaran...</div>
            <audio id="audioPlayer"></audio>
            <div class="queue-info" id="queueInfo"></div>
            <div class="listeners"><span id="listenerCount">0</span> Pendengar</div>
        </div>
    </div>
    <button class="upload-btn" id="uploadBtn" title="Upload Audio - Admin Only">+</button>

    <!-- Login Modal -->
    <div class="modal active" id="loginModal">
        <div class="modal-content">
            <h2>Selamat Datang di Suara Besuki FM 102.5</h2>
            <p style="color: #888; margin-bottom: 20px;">Silakan login untuk mendengarkan siaran</p>
            <button class="google-btn" id="loginBtn">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
                Login dengan Google
            </button>
        </div>
    </div>

    <!-- Profile Modal -->
    <div class="modal" id="profileModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('profileModal')">&times;</button>
            <h2>Profil</h2>
            <img id="profileAvatar" style="width:80px;height:80px;border-radius:50%;margin:20px auto;">
            <p id="profileName" style="font-size:1.2rem;margin:10px 0;"></p>
            <p id="profileEmail" style="color:#888;margin-bottom:20px;"></p>
            <button class="btn btn-danger" id="logoutBtn">Logout</button>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('uploadModal')">&times;</button>
            <h2>Upload Audio</h2>
            <p style="color:#888;margin-bottom:20px;">Pilih file audio MP3, WAV, OGG, M4A</p>
            <input type="file" id="fileInput" accept="audio/*" multiple>
            <button class="btn" onclick="document.getElementById('fileInput').click()">Pilih File Audio</button>
            <div class="file-list" id="fileList"></div>
            <button class="btn" id="addBtn" style="display:none;">Tambahkan ke Antrian</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-storage.js";
        import { getDatabase, ref as dbRef, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDrEQ7GcPPo8CbqF0_dRwDlXSXbz1FsmPs",
            authDomain: "hahahihi-5084e.firebaseapp.com",
            databaseURL: "https://hahahihi-5084e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "hahahihi-5084e",
            storageBucket: "hahahihi-5084e.firebasestorage.app",
            messagingSenderId: "691544964510",
            appId: "1:691544964510:web:561a1aed05c8a8f5ff6a8f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const rtdb = getDatabase(app);

        let currentUser = null;
        let isAdmin = false;
        let selectedFiles = [];
        let currentTrack = null;
        let queueUnsubscribe = null;

        const audioPlayer = document.getElementById('audioPlayer');
        const loginModal = document.getElementById('loginModal');
        const profileModal = document.getElementById('profileModal');
        const uploadModal = document.getElementById('uploadModal');

        document.getElementById('loginBtn').onclick = async () => {
            const provider = new GoogleAuthProvider();
            try { await signInWithPopup(auth, provider); } 
            catch (e) { alert('Login gagal: ' + e.message); }
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth);
        document.getElementById('profileBtn').onclick = () => profileModal.classList.add('active');
        document.getElementById('uploadBtn').onclick = () => {
            uploadModal.classList.add('active');
            selectedFiles = [];
            renderFileList();
        };
        document.getElementById('fileInput').onchange = (e) => {
            selectedFiles = Array.from(e.target.files);
            renderFileList();
        };

        function renderFileList() {
            const list = document.getElementById('fileList');
            const addBtn = document.getElementById('addBtn');
            if (selectedFiles.length === 0) {
                list.innerHTML = '<p style="color:#666;text-align:center;">Belum ada file dipilih</p>';
                addBtn.style.display = 'none';
                return;
            }
            list.innerHTML = selectedFiles.map((f, i) => `<div class="file-item">${i+1}. ${f.name} (${(f.size/1024/1024).toFixed(2)} MB)</div>`).join('');
            addBtn.style.display = 'inline-block';
        }

        document.getElementById('addBtn').onclick = async () => {
            if (!isAdmin || selectedFiles.length === 0) return;
            const addBtn = document.getElementById('addBtn');
            addBtn.disabled = true;
            addBtn.textContent = 'Uploading...';
            try {
                for (const file of selectedFiles) {
                    const timestamp = Date.now();
                    const safeName = file.name.replace(/[^a-zA-Z0-9.]/g, '_');
                    const storageRef = ref(storage, `audio/${timestamp}_${safeName}`);
                    await uploadBytes(storageRef, file);
                    const url = await getDownloadURL(storageRef);
                    await addDoc(collection(db, 'queue'), {
                        name: file.name, url: url, storagePath: storageRef.fullPath,
                        uploader: currentUser.email, timestamp: serverTimestamp()
                    });
                }
                alert(`Berhasil! ${selectedFiles.length} file ditambahkan`);
                selectedFiles = [];
                renderFileList();
                closeModal('uploadModal');
            } catch (e) { alert('Upload gagal: ' + e.message); }
            addBtn.disabled = false;
            addBtn.textContent = 'Tambahkan ke Antrian';
        };

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        window.closeModal = closeModal;

        // INI YANG UDAH DIBENERIN: PAKE user.uid BUKAN user.email
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                loginModal.classList.remove('active');
                document.getElementById('profileBtn').style.display = 'flex';
                document.getElementById('userAvatar').src = user.photoURL;
                document.getElementById('userName').textContent = user.displayName.split(' ')[0];
                document.getElementById('profileAvatar').src = user.photoURL;
                document.getElementById('profileName').textContent = user.displayName;
                document.getElementById('profileEmail').textContent = user.email;

                // CEK ADMIN PAKE UID - INI KUNCINYA
                const adminDoc = await getDoc(doc(db, 'admins', user.uid));
                isAdmin = adminDoc.exists() && adminDoc.data().role === 'admin';
                document.getElementById('uploadBtn').style.display = isAdmin? 'block' : 'none';
                console.log('Admin:', isAdmin, 'UID:', user.uid);

                const userRef = dbRef(rtdb, `listeners/${user.uid}`);
                set(userRef, true);
                onDisconnect(userRef).remove();
                initPlayer();
            } else {
                currentUser = null;
                isAdmin = false;
                loginModal.classList.add('active');
                document.getElementById('profileBtn').style.display = 'none';
                document.getElementById('uploadBtn').style.display = 'none';
                audioPlayer.pause();
                if (queueUnsubscribe) queueUnsubscribe();
            }
        });

        onValue(dbRef(rtdb, 'listeners'), (snapshot) => {
            document.getElementById('listenerCount').textContent = snapshot.size || 0;
        });

        function initPlayer() {
            const q = query(collection(db, 'queue'), orderBy('timestamp'));
            queueUnsubscribe = onSnapshot(q, (snapshot) => {
                const tracks = [];
                snapshot.forEach(doc => tracks.push({ id: doc.id,...doc.data() }));
                document.getElementById('queueInfo').textContent = tracks.length > 0? `${tracks.length} lagu dalam antrian` : 'Antrian kosong';
                if (!currentTrack && tracks.length > 0) playNext(tracks[0]);
            });
        }

        async function playNext(track) {
            if (!track) {
                currentTrack = null;
                document.getElementById('nowPlaying').textContent = 'Menunggu siaran...';
                audioPlayer.pause();
                return;
            }
            currentTrack = track;
            document.getElementById('nowPlaying').textContent = `▶ ${track.name}`;
            audioPlayer.src = track.url;
            try { await audioPlayer.play(); } catch (e) { console.log('Autoplay prevented.'); }
        }

        audioPlayer.onended = async () => {
            if (currentTrack) {
                try {
                    await deleteObject(ref(storage, currentTrack.storagePath));
                    await deleteDoc(doc(db, 'queue', currentTrack.id));
                } catch (e) { console.error('Error deleting:', e); }
                currentTrack = null;
            }
        };

        audioPlayer.onerror = () => {
            if (currentTrack) {
                deleteDoc(doc(db, 'queue', currentTrack.id));
                currentTrack = null;
            }
        };

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) audioPlayer.pause();
            else if (currentUser && currentTrack) audioPlayer.play().catch(() => {});
        });
        window.addEventListener('beforeunload', () => audioPlayer.pause());
        document.addEventListener('contextmenu', (e) => { if (!isAdmin) e.preventDefault(); });
    </script>
</body>
    </html>
