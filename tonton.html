<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menonton - HahaHihi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Pembungkus utama sekaligus penangkap sensor ketukan */
        .player-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: #000;
        }

        #embedPlayer {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Indikator Animasi Play/Pause di Tengah Layar */
        .status-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: rgba(255, 255, 255, 0.8);
            font-size: 80px;
            z-index: 20;
            pointer-events: none;
            transition: transform 0.2s ease-out, opacity 0.2s ease-out;
            opacity: 0;
        }
        .status-icon.muncul {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="player-wrapper" id="playerArea">
        <!-- Frame video: ditambahkan parameter &mute=0 agar suara dipaksa menyala -->
        <iframe id="embedPlayer" src="" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>
        <div id="statusIcon" class="status-icon">▶</div>
    </div>

    <!-- Sistem Firebase: Presence & Deteksi Penonton -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getDatabase, ref, onValue, push, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDrEQ7GcPPo8CbqF0_dRwDlXSXbz1FsmPs",
          authDomain: "hahahihi-5084e.firebaseapp.com",
          projectId: "hahahihi-5084e",
          storageBucket: "hahahihi-5084e.firebasestorage.app",
          messagingSenderId: "691544964510",
          appId: "1:691544964510:web:561a1aed05c8a8f5ff6a8f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        let contentId = urlParams.get('id');
        let mediaLink = urlParams.get('link');

        if(mediaLink) {
            // Modifikasi link agar AUTOPLAY AKTIF & SUARA NYALA (mute=0)
            if(mediaLink.includes('youtube.com/embed')) {
                const separator = mediaLink.includes('?') ? '&' : '?';
                // Menambahkan parameter pengaktif suara otomatis milik YouTube
                mediaLink += `${separator}autoplay=1&mute=0&enablejsapi=1&controls=1`;
            }
            document.getElementById('embedPlayer').src = mediaLink;
        }

        // SISTEM PENONTON ASLI (PRESENCE SYSTEM)
        if (contentId) {
            const connectedRef = ref(rtdb, ".info/connected");
            const viewersRef = ref(rtdb, `contents/${contentId}/activeViewers`);

            onValue(connectedRef, (snap) => {
                if (snap.val() === true) {
                    const myPresenceRef = push(viewersRef);
                    updateDoc(doc(db, "embeds", contentId), {
                        penontonAktif: increment(1)
                    }).catch(err => console.log("Gagal nambah penonton:", err));

                    onDisconnect(myPresenceRef).remove();
                    onDisconnect(doc(db, "embeds", contentId)).update({
                        penontonAktif: increment(-1)
                    });
                }
            });
        }
    </script>

    <!-- Logika Kontrol Sentuhan & Ketukan Layar -->
    <script>
        const playerArea = document.getElementById('playerArea');
        const iframe = document.getElementById('embedPlayer');
        const statusIcon = document.getElementById('statusIcon');
        
        let isPlaying = true; 
        let tapCount = 0;
        let tapTimer = null;

        function tampilkanIkon(simbol) {
            statusIcon.innerText = simbol;
            statusIcon.classList.add('muncul');
            setTimeout(() => {
                statusIcon.classList.remove('muncul');
            }, 600);
        }

        // Tangkap sentuhan di area pembungkus player
        playerArea.addEventListener('click', (e) => {
            // Jika yang diklik adalah iframe-nya langsung, biarkan interaksi bawaan video berjalan (termasuk urusan unmute suara)
            if (e.target === iframe) return;

            tapCount++;

            if (tapCount === 1) {
                tapTimer = setTimeout(() => {
                    // --- 1x Sentuh: PLAY / PAUSE ---
                    if(isPlaying) {
                        iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                        tampilkanIkon("⏸");
                        isPlaying = false;
                    } else {
                        iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                        tampilkanIkon("▶");
                        isPlaying = true;
                    }
                    tapCount = 0;
                }, 300);
            } else if (tapCount === 2) {
                // --- 2x Sentuh: KEMBALI KE BERANDA ---
                clearTimeout(tapTimer);
                tampilkanIkon("🏠"); 
                setTimeout(() => {
                    window.location.href = 'beranda.html';
                }, 300);
                tapCount = 0;
            }
        });
    </script>
</body>
</html>
