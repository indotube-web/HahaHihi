<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beranda - HahaHihi</title>
<style>
/* CSS tetap sama dengan sebelumnya */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background-color: #000000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #ffffff; min-height: 100vh; overflow-x: hidden; }
header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #222; }
.logo-box { padding: 10px 20px; border: 3px solid #fff; border-radius: 8px; display: inline-block; font-size: 24px; font-weight: 900; animation: bingkaiWarna 11s infinite linear; }
.logo-box span { display: inline-block; animation: hurufWarna 3s infinite steps(1); }
.header-right { display: flex; align-items: center; gap: 15px; }
.btn-tambah { background-color: transparent; font-size: 14px; font-weight: bold; padding: 10px 20px; border-radius: 25px; cursor: pointer; text-decoration: none; border: 2px solid #fff; color: #fff; }
.profile-container { width: 46px; height: 46px; border-radius: 50%; cursor: pointer; background: conic-gradient(#ff0000, #ffff00, #00ff00, #0000ff, #ff00ff); padding: 3px; }
.profile-border-inner { width: 100%; height: 100%; border-radius: 50%; background: #000; overflow: hidden; }
.profile-container img { width: 100%; height: 100%; object-fit: cover; }
.category-wrapper { width: 100%; overflow-x: auto; white-space: nowrap; padding: 20px; scrollbar-width: none; }
.category-btn { padding: 14px 32px; margin-right: 15px; border-radius: 30px; font-weight: 900; font-size: 18px; cursor: pointer; border: none; animation: kategoriWarna 110s infinite steps(1); }
.content-display { padding: 10px 20px; margin: 0 auto; max-width: 800px; display: flex; flex-direction: column; gap: 15px; }
.embed-card { display: flex; align-items: center; padding: 12px; background-color: #111; border: 3px solid #fff; border-radius: 12px; color: #fff; cursor: pointer; }
.embed-card.is-playing { border-color: #00ff66; box-shadow: 0 0 15px rgba(0, 255, 102, 0.5); }
.embed-thumb-box { width: 120px; height: 80px; border-radius: 8px; overflow: hidden; margin-right: 15px; flex-shrink: 0; background-color: #222; }
.embed-thumb-box img { width: 100%; height: 100%; object-fit: cover; }
.embed-info { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; }
.embed-name { font-size: 18px; font-weight: 800; }
.embed-viewers { font-size: 14px; color: #00ff66; }
@keyframes bingkaiWarna { 0% { border-color: #ff0000; } 50% { border-color: #00ff00; } 100% { border-color: #ff0000; } }
@keyframes hurufWarna { 0% { color: #ff00ff; } 100% { color: #00ffff; } }
@keyframes kategoriWarna { 0% { background-color: #ff0000; } 50% { background-color: #0000ff; } 100% { background-color: #ff0000; } }
</style>
</head>
<body>

<header>
  <div class="logo-box"><span>H</span><span>a</span><span>h</span><span>a</span><span>H</span><span>i</span><span>h</span><span>i</span></div>
  <div class="header-right">
    <a href="tambah.html" class="btn-tambah">+Tambahkan</a>
    <div class="profile-container" onclick="window.location.href='profil.html'">
      <div class="profile-border-inner">
        <img id="userAvatar" src="https://www.w3schools.com/howto/img_avatar.png" alt="Profil">
      </div>
    </div>
  </div>
</header>

<div class="category-wrapper">
  <button class="category-btn" onclick="selectCategory('Radio')">Radio</button>
  <button class="category-btn" onclick="selectCategory('TV')">TV</button>
  <button class="category-btn" onclick="selectCategory('Video')">Video</button>
</div>

<div class="content-display" id="contentDisplay"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = { /* ... isikan config kamu ... */ };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allEmbedData = [];
let currentSelectedCategory = "Radio";
window.activePlayingSessions = {};

onAuthStateChanged(auth, (user) => { if (user && user.photoURL) document.getElementById('userAvatar').src = user.photoURL; });

const q = query(collection(db, "embeds"), orderBy("createdAt", "desc"));
onSnapshot(q, (snapshot) => {
  allEmbedData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  renderEmbedsByCategory(currentSelectedCategory);
});

function renderEmbedsByCategory(kategori) {
  currentSelectedCategory = kategori;
  const displayZone = document.getElementById('contentDisplay');
  displayZone.innerHTML = "";
  const filteredData = allEmbedData.filter(item => item.kategori === kategori);

  filteredData.forEach(item => {
    const card = document.createElement('div');
    card.className = 'embed-card';
    card.id = `card-${item.id}`;
    card.onclick = () => window.togglePlay(item.id, item.linkFinal, item.thumbnail, item.kategori);
    card.innerHTML = `
      <div class="embed-thumb-box" id="box-${item.id}"><img src="${item.thumbnail || 'https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=150'}" alt="Thumb"></div>
      <div class="embed-info">
        <div class="embed-name">${item.nama}</div>
        <div class="embed-viewers"><span id="viewers-${item.id}">${item.penontonAktif || 0}</span> menyaksikan</div>
      </div>`;
    displayZone.appendChild(card);
  });
}

window.selectCategory = renderEmbedsByCategory;

window.togglePlay = async (id, link, thumbUrl, kategori) => {
  const cardElement = document.getElementById(`card-${id}`);
  const box = document.getElementById(`box-${id}`);
  const isPlaying = window.activePlayingSessions[id];

  if (!isPlaying) {
    window.activePlayingSessions[id] = true;
    cardElement.classList.add('is-playing');
    
    // DETEKSI OTOMATIS: Radio vs Iframe
    if (kategori === "Radio") {
      box.innerHTML = `<audio autoplay controls style="width:100%; height:40px;"><source src="${link}" type="audio/mpeg"></audio>`;
    } else {
      box.innerHTML = `<iframe src="${link.includes('?') ? link+'&autoplay=1' : link+'?autoplay=1'}" style="width:100%; height:100%; border:none;" allow="autoplay" allowfullscreen></iframe>`;
    }
    await updateDoc(doc(db, "embeds", id), { penontonAktif: increment(1) });
  } else {
    delete window.activePlayingSessions[id];
    cardElement.classList.remove('is-playing');
    box.innerHTML = `<img src="${thumbUrl}" alt="Thumb">`;
    await updateDoc(doc(db, "embeds", id), { penontonAktif: increment(-1) });
  }
};
</script>
</body>
</html>
